services:
  neo4j:
    image: neo4j:5.20-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/arenapulse123
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=arenapulse
      - POSTGRES_PASSWORD=arenapulse123
      - POSTGRES_DB=arenapulse
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://arenapulse:arenapulse123@postgres:5432/arenapulse
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=arenapulse123
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=super-secret-key-change-in-production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ENVIRONMENT=development
    depends_on:
      - neo4j
      - postgres
      - redis
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  neo4j_data:
  postgres_data:
  redis_data:
