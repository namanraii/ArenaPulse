name: ArenaPulse CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black isort
      - name: Format check (black)
        run: black --check app --line-length=100
      - name: Import order check (isort)
        run: isort --check-only app --profile=black --line-length=100
      - name: Lint with flake8
        run: flake8 app --max-line-length=120 --extend-ignore=E203,W503,E501
      - name: Type check with mypy
        run: mypy app --ignore-missing-imports
      - name: Test with pytest (coverage gate 65%)
        run: pytest --cov=app --cov-report=xml --cov-fail-under=65
      - name: Security audit
        run: pip install pip-audit && pip-audit --requirement requirements.txt

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Security audit
        run: npm audit --audit-level=high
      - name: Format check (Prettier)
        run: npx prettier --check "src/**/*.{ts,tsx,css}"
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test -- --run
      - name: Build
        run: npm run build
